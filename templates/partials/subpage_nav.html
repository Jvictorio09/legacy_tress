{% load static %}
<style>
  .sub-nav{
    position:sticky;top:0;z-index:50;
    background:rgba(254,252,246,.92);backdrop-filter:blur(14px) saturate(1.1);
    border-bottom:1px solid rgba(27,58,42,.12);
    padding:calc(14px + env(safe-area-inset-top,0px)) 0 14px;
  }
  .sub-nav__inner{
    max-width:1100px;margin:0 auto;padding:0 22px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    min-height:44px;
  }
  .sub-nav__logo img{height:38px;width:auto;display:block}
  .sub-nav__links{display:flex;align-items:center;gap:6px 18px;flex-wrap:wrap;justify-content:flex-end}
  .sub-nav__links a{
    font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;
    color:#5A6358;padding:10px 4px;min-height:44px;display:inline-flex;align-items:center;
    transition:color .25s;
  }
  .sub-nav__links a:hover,.sub-nav__links a.is-active{color:#9C7A38}
  .sub-nav__book{
    padding:10px 16px!important;min-height:44px;
    border:1px solid rgba(198,163,92,.42);border-radius:999px;
    color:#1B3A2A!important;font-weight:500;
  }
  .sub-nav__book:hover{background:#1B3A2A;color:#F7F3EA!important;border-color:#1B3A2A}
  .sub-nav__toggle{
    display:none;width:44px;height:44px;border:0;background:transparent;cursor:pointer;
    flex-direction:column;justify-content:center;align-items:center;gap:6px;
    -webkit-tap-highlight-color:transparent;
  }
  .sub-nav__toggle span{display:block;width:24px;height:1.5px;background:#1B3A2A;transition:transform .3s,opacity .25s}
  .sub-nav__toggle.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
  .sub-nav__toggle.open span:nth-child(2){opacity:0}
  .sub-nav__toggle.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
  .sub-nav__panel{
    display:none;position:fixed;inset:0;z-index:60;background:rgba(16,34,23,.45);
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  .sub-nav__panel.open{opacity:1;pointer-events:auto}
  .sub-nav__drawer{
    position:absolute;top:0;right:0;bottom:0;width:min(100%,300px);
    background:#FEFCF6;border-left:1px solid rgba(198,163,92,.35);
    transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);
    padding:calc(72px + env(safe-area-inset-top,0px)) 24px calc(24px + env(safe-area-inset-bottom,0px));
    display:flex;flex-direction:column;gap:4px;
  }
  .sub-nav__panel.open .sub-nav__drawer{transform:translateX(0)}
  .sub-nav__drawer a{
    display:flex;align-items:center;min-height:48px;padding:12px 0;
    font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:#1B3A2A;
    border-bottom:1px solid rgba(27,58,42,.08);
  }
  body.sub-nav-open{overflow:hidden}
  @media(max-width:720px){
    .sub-nav__links{display:none}
    .sub-nav__toggle{display:flex}
  }
  @media(max-width:380px){
    .sub-nav__inner{padding:0 16px}
    .sub-nav__logo img{height:34px}
  }
</style>
<header class="sub-nav">
  <div class="sub-nav__inner">
    <a href="{% url 'index' %}" class="sub-nav__logo" aria-label="LegacyTress home">
      <img src="{% static 'assets/logo.png' %}" alt="LegacyTress Braiding Salon">
    </a>
    <nav class="sub-nav__links" aria-label="Page navigation">
      <a href="{% url 'index' %}#services">Services</a>
      <a href="{% url 'try_on' %}"{% if subnav_active == 'try_on' %} class="is-active"{% endif %}>Try-On</a>
      <a href="{% url 'boho_try_on' %}"{% if subnav_active == 'boho' %} class="is-active"{% endif %}>Boho AI</a>
      <a href="{% url 'index' %}">Home</a>
      <a href="#" data-book class="sub-nav__book" target="_blank" rel="noopener">Book</a>
    </nav>
    <button type="button" class="sub-nav__toggle" id="subNavToggle" aria-label="Open menu" aria-expanded="false" aria-controls="subNavPanel">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
<div class="sub-nav__panel" id="subNavPanel" aria-hidden="true">
  <div class="sub-nav__drawer" role="navigation" aria-label="Mobile page navigation">
    <a href="{% url 'index' %}#services">Services</a>
    <a href="{% url 'try_on' %}">Virtual Try-On</a>
    <a href="{% url 'boho_try_on' %}">Ethereal Boho AI</a>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'policies' %}">Policies</a>
    <a href="#" data-book target="_blank" rel="noopener">Book Now</a>
  </div>
</div>
<script>
(function(){
  var BOOK='https://www.fresha.com/a/legacytress-margate-7644-margate-boulevard-j6v0alyk/booking?menu=true&dppub=true&cartId=6573ce45-8ba1-4c60-b9f8-d6f22b37a5b0';
  document.querySelectorAll('[data-book]').forEach(function(a){a.href=BOOK});
  var toggle=document.getElementById('subNavToggle');
  var panel=document.getElementById('subNavPanel');
  if(!toggle||!panel)return;
  function setOpen(open){
    document.body.classList.toggle('sub-nav-open',open);
    panel.classList.toggle('open',open);
    toggle.classList.toggle('open',open);
    toggle.setAttribute('aria-expanded',open?'true':'false');
    toggle.setAttribute('aria-label',open?'Close menu':'Open menu');
    panel.setAttribute('aria-hidden',open?'false':'true');
  }
  toggle.addEventListener('click',function(){setOpen(!panel.classList.contains('open'))});
  panel.addEventListener('click',function(e){if(e.target===panel)setOpen(false)});
  panel.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){setOpen(false)})});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')setOpen(false)});
})();
</script>
